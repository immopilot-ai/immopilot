<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120" role="img" aria-label="ImmoPilot — Automatisation IA pour l'immobilier">
  <title>ImmoPilot</title>

  <!-- ═══ ICÔNE : maison contour + P ═══ -->
  <!-- Toit -->
  <polyline
    points="10,62 62,10 114,62"
    fill="none"
    stroke="#8BA5B8"
    stroke-width="3"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Murs -->
  <line x1="18" y1="58" x2="18" y2="110" stroke="#8BA5B8" stroke-width="3" stroke-linecap="round"/>
  <line x1="106" y1="58" x2="106" y2="110" stroke="#8BA5B8" stroke-width="3" stroke-linecap="round"/>

  <!-- Fenêtres 2×2 -->
  <rect x="24" y="80" width="10" height="10" fill="none" stroke="#8BA5B8" stroke-width="1.8"/>
  <rect x="37" y="80" width="10" height="10" fill="none" stroke="#8BA5B8" stroke-width="1.8"/>
  <rect x="24" y="93" width="10" height="10" fill="none" stroke="#8BA5B8" stroke-width="1.8"/>
  <rect x="37" y="93" width="10" height="10" fill="none" stroke="#8BA5B8" stroke-width="1.8"/>

  <!-- P ardoise — seul élément coloré de l'icône -->
  <text
    x="46"
    y="108"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="700"
    fill="#3D5A73"
  >P</text>

  <!-- ═══ SÉPARATEUR ═══ -->
  <line x1="142" y1="20" x2="142" y2="100" stroke="#8BA5B8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ═══ WORDMARK ═══ -->
  <!-- "IMMO" gris moyen -->
  <text
    x="162"
    y="75"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="46"
    font-weight="300"
    fill="#8BA5B8"
    letter-spacing="10"
  >IMMO</text>
  <!-- "PILOT" ardoise -->
  <text
    x="316"
    y="75"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="46"
    font-weight="300"
    fill="#3D5A73"
    letter-spacing="10"
  >PILOT</text>

  <!-- Baseline -->
  <text
    x="163"
    y="97"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="9.5"
    font-weight="400"
    fill="#8BA5B8"
    letter-spacing="3.5"
  >AUTOMATISATION IA POUR L'IMMOBILIER</text>
</svg>
